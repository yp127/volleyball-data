<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>배구대회 정보</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Malgun Gothic',Arial,sans-serif; font-size:12px; color:#111; background:#fff; }

/* 상단 고정 헤더 */
#header { position:sticky; top:0; z-index:20; background:#fff; border-bottom:2px solid #000; }
#tabbar { display:flex; border-bottom:1px solid #aaa; }
.tab { padding:6px 18px; font-size:12px; font-weight:600; cursor:pointer; border-right:1px solid #aaa; background:#f0f0f0; }
.tab.active { background:#fff; border-bottom:2px solid #fff; margin-bottom:-1px; }
#toolbar { display:flex; gap:6px; padding:5px 8px; align-items:center; background:#fafafa; border-bottom:1px solid #ddd; flex-wrap:wrap; }
#toolbar input { padding:3px 7px; border:1px solid #aaa; font-size:12px; width:180px; }
#toolbar select { padding:3px 6px; border:1px solid #aaa; font-size:12px; }
#toolbar button { padding:3px 10px; border:1px solid #aaa; font-size:12px; background:#e8e8e8; cursor:pointer; }
#toolbar button:hover { background:#d0d0d0; }
#statbar { padding:3px 8px; font-size:11px; color:#555; background:#f5f5f5; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; }

/* 테이블 */
#tableWrap { overflow:auto; height:calc(100vh - 90px); }
table { border-collapse:collapse; width:100%; }
th { background:#ddd; border:1px solid #aaa; padding:4px 7px; white-space:nowrap; font-size:11px; font-weight:700; position:sticky; top:0; z-index:5; text-align:center; cursor:pointer; user-select:none; }
th:hover { background:#ccc; }
td { border:1px solid #ccc; padding:3px 7px; white-space:nowrap; vertical-align:middle; }
tr:nth-child(even) td { background:#f9f9f9; }
tr:hover td { background:#fffde0; }
tr.new-row td { background:#f0fff0; }
td.result-ok { color:#006400; font-weight:600; }
td.result-none { color:#aaa; }
td.center { text-align:center; }
td.right { text-align:right; }
a.link { color:#00c; font-size:11px; }
.badge-new { background:#ffeb3b; border:1px solid #aaa; padding:1px 5px; font-size:10px; font-weight:700; }

.loading { padding:40px; text-align:center; color:#999; }
.empty { padding:40px; text-align:center; color:#999; }
</style>
</head>
<body>

<div id="header">
  <div id="tabbar">
    <div class="tab active" onclick="switchTab('results',this)">대회결과 RAW</div>
    <div class="tab" onclick="switchTab('schedule',this)">대회일정</div>
    <div class="tab" onclick="switchTab('final',this)">최종데이터</div>
  </div>
  <div id="toolbar">
    <input id="searchInput" type="text" placeholder="검색..." oninput="render()"/>
    <select id="filterSel" onchange="render()">
      <option value="all">전체</option>
      <option value="new">★신규만</option>
      <option value="ok">결과있음</option>
      <option value="none">결과없음</option>
    </select>
    <button onclick="reload()">새로고침</button>
    <button onclick="copyTSV()">엑셀복사</button>
    <span id="metaInfo" style="color:#555;font-size:11px;margin-left:8px"></span>
  </div>
  <div id="statbar">
    <span id="statText"></span>
    <span id="lastUpdate"></span>
  </div>
</div>

<div id="tableWrap"><div class="loading">불러오는 중...</div></div>

<script>
var BASE = "https://yp127.github.io/volleyball-data/";
var tab = "results";
var DATA = {results:[], schedule:[], final:[]};
var loaded = {};
var sortCol = -1, sortAsc = true;

function parseCSV(text) {
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  var lines=text.trim().split("\n"), headers=null, out=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(line.charAt(0)==='"'&&line.slice(-1)==='"') line=line.slice(1,-1);
    line=line.split('""').join('\x00');
    var cols=[],cur="",inQ=false;
    for(var j=0;j<line.length;j++){
      var c=line[j];
      if(c==='"') inQ=!inQ;
      else if(c===','&&!inQ){cols.push(cur.replace(/\x00/g,'"'));cur="";}
      else cur+=c;
    }
    cols.push(cur.replace(/\x00/g,'"'));
    if(!headers) headers=cols.map(function(h){return h.trim();});
    else { var o={}; headers.forEach(function(h,k){o[h]=(cols[k]||"").trim();}); out.push(o); }
  }
  return out;
}

function loadCSV(file, cb) {
  fetch(BASE+file+"?t="+Date.now())
    .then(function(r){return r.text();})
    .then(function(t){cb(parseCSV(t));})
    .catch(function(){cb([]);});
}

function reload() {
  loaded={};
  fetch(BASE+"meta.json?t="+Date.now())
    .then(function(r){return r.json();})
    .then(function(m){
      document.getElementById("metaInfo").textContent="최종수집: "+m.last_updated;
      document.getElementById("lastUpdate").textContent="신규: "+m.new_count+"건";
    }).catch(function(){});
  loadTab(tab);
}

function loadTab(t) {
  tab=t;
  if(loaded[t]){render();return;}
  document.getElementById("tableWrap").innerHTML='<div class="loading">불러오는 중...</div>';
  var files={results:"cafe_results.csv",schedule:"cafe_schedule.csv",final:"final_data.csv"};
  loadCSV(files[t], function(rows){
    DATA[t]=rows;
    loaded[t]=true;
    render();
  });
}

function switchTab(t, el) {
  document.querySelectorAll(".tab").forEach(function(e){e.classList.remove("active");});
  el.classList.add("active");
  document.getElementById("searchInput").value="";
  document.getElementById("filterSel").value="all";
  // 결과탭 아닌 경우 필터 숨기기
  document.getElementById("filterSel").style.display = t==="results"?"":"none";
  loadTab(t);
}

// 우승 파싱
function parseWinner(content) {
  if(!content) return {has:false,text:""};
  var kw=["우승","준우승","1위","2위","경기결과","입상","순위","결과"];
  if(!kw.some(function(k){return content.indexOf(k)>=0;})) return {has:false,text:""};
  var winners=[], p=/우\s*승\s*[:\s]?\s*([가-힣\w\.&]{2,12})/g, m;
  while((m=p.exec(content))!==null) winners.push(m[1].trim());
  var u=winners.filter(function(v,i,a){return a.indexOf(v)===i;}).slice(0,2);
  return {has:true, text:u.length?u.join(" / "):"있음"};
}

function render() {
  if(tab==="results") renderResults();
  else if(tab==="schedule") renderSchedule();
  else renderFinal();
}

function renderResults() {
  var q=document.getElementById("searchInput").value.toLowerCase();
  var f=document.getElementById("filterSel").value;
  var rows=DATA.results.slice().reverse().map(function(d){
    d._w=parseWinner(d["본문"]||""); return d;
  });
  if(q) rows=rows.filter(function(d){return (d["제목"]||"").toLowerCase().indexOf(q)>=0;});
  if(f==="new") rows=rows.filter(function(d){return d["신규"]==="Y";});
  if(f==="ok") rows=rows.filter(function(d){return d._w.has;});
  if(f==="none") rows=rows.filter(function(d){return !d._w.has;});

  document.getElementById("statText").textContent=rows.length+"행";

  var cols=["신규","게시판","제목","작성일","조회수","결과여부","우승(파싱)","원문"];
  var html=makeHead(cols);
  html+="<tbody>";
  rows.forEach(function(d){
    var isNew=d["신규"]==="Y";
    html+='<tr class="'+(isNew?"new-row":"")+'">'
      +'<td class="center">'+(isNew?'<span class="badge-new">NEW</span>':'')+'</td>'
      +'<td>'+esc(d["게시판"])+'</td>'
      +'<td style="max-width:280px;overflow:hidden;text-overflow:ellipsis" title="'+esc(d["제목"])+'">'+esc(d["제목"])+'</td>'
      +'<td class="center">'+esc(d["작성일"])+'</td>'
      +'<td class="right">'+Number(d["조회수"]||0).toLocaleString()+'</td>'
      +'<td class="center '+(d._w.has?"result-ok":"result-none")+'">'+(d._w.has?"O":"X")+'</td>'
      +'<td class="result-ok" style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="'+esc(d._w.text)+'">'+esc(d._w.text)+'</td>'
      +'<td class="center"><a class="link" href="'+esc(d["URL"])+'" target="_blank">열기</a></td>'
      +'</tr>';
  });
  html+="</tbody></table>";
  document.getElementById("tableWrap").innerHTML=html;
}

function renderSchedule() {
  var q=document.getElementById("searchInput").value.toLowerCase();
  var rows=DATA.schedule.slice();
  if(q) rows=rows.filter(function(d){return (d["대회명"]||"").toLowerCase().indexOf(q)>=0||(d["장소"]||"").toLowerCase().indexOf(q)>=0;});
  document.getElementById("statText").textContent=rows.length+"행";
  var nowM=new Date().getMonth()+1;
  var cols=["월","대회명","기간","장소","상태"];
  var html=makeHead(cols); html+="<tbody>";
  rows.forEach(function(d){
    var m=parseInt((d["월"]||"").replace("월",""));
    var st=m<nowM?"종료":m===nowM?"이번달":"예정";
    html+='<tr>'
      +'<td class="center">'+esc(d["월"])+'</td>'
      +'<td>'+esc(d["대회명"])+'</td>'
      +'<td class="center">'+esc(d["기간"])+'</td>'
      +'<td>'+esc(d["장소"])+'</td>'
      +'<td class="center">'+st+'</td>'
      +'</tr>';
  });
  html+="</tbody></table>";
  document.getElementById("tableWrap").innerHTML=html;
}

function renderFinal() {
  var q=document.getElementById("searchInput").value.toLowerCase();
  var rows=DATA.final.slice();
  if(q) rows=rows.filter(function(d){return (d["title"]||"").toLowerCase().indexOf(q)>=0||(d["winner"]||"").toLowerCase().indexOf(q)>=0;});
  document.getElementById("statText").textContent=rows.length+"행";
  if(!rows.length){
    document.getElementById("tableWrap").innerHTML='<div class="empty">final_data.csv 없음 — GitHub에 업로드 필요</div>';
    return;
  }
  var cols=["연도","대회명","장소","시작","종료","우승","우승인스타","준우승","부문1우승","부문1준우승","부문2우승","부문2준우승","부문3우승","부문3준우승","부문4우승","부문4준우승","AI분석","링크"];
  var html=makeHead(cols); html+="<tbody>";
  rows.forEach(function(d){
    html+='<tr>'
      +'<td class="center">'+esc(d["year"])+'</td>'
      +'<td style="min-width:160px">'+esc(d["title"])+'</td>'
      +'<td>'+esc(d["location"])+'</td>'
      +'<td class="center">'+esc(d["start"])+'</td>'
      +'<td class="center">'+esc(d["end"])+'</td>'
      +'<td><b>'+esc(d["winner"])+'</b></td>'
      +'<td>'+(d["winner_insta"]?'<a class="link" href="https://instagram.com/'+esc(d["winner_insta"].replace("@",""))+'" target="_blank">'+esc(d["winner_insta"])+'</a>':'')+'</td>'
      +'<td>'+esc(d["runner"])+'</td>'
      +'<td>'+esc(d["1._winner"])+'</td><td>'+esc(d["1._runner"])+'</td>'
      +'<td>'+esc(d["2._winner"])+'</td><td>'+esc(d["2._runner"])+'</td>'
      +'<td>'+esc(d["3._winner"])+'</td><td>'+esc(d["3._runner"])+'</td>'
      +'<td>'+esc(d["4._winner"])+'</td><td>'+esc(d["4._runner"])+'</td>'
      +'<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="'+esc(d["AI 경기분석"]||"")+'">'+esc((d["AI 경기분석"]||"").substring(0,30))+'</td>'
      +'<td class="center">'+(d["link"]?'<a class="link" href="'+esc(d["link"])+'" target="_blank">링크</a>':'')+'</td>'
      +'</tr>';
  });
  html+="</tbody></table>";
  document.getElementById("tableWrap").innerHTML=html;
}

function makeHead(cols) {
  var html='<table><thead><tr>';
  cols.forEach(function(c,i){
    html+='<th onclick="sortBy('+i+')">'+c+(sortCol===i?(sortAsc?"▲":"▼"):"")+'</th>';
  });
  return html+'</tr></thead>';
}

function sortBy(i) {
  if(sortCol===i) sortAsc=!sortAsc; else{sortCol=i;sortAsc=true;}
  render();
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function copyTSV() {
  var table=document.querySelector("#tableWrap table");
  if(!table){alert("표 없음");return;}
  var rows=table.querySelectorAll("tr"), tsv=[];
  rows.forEach(function(r){
    var cells=r.querySelectorAll("th,td"), line=[];
    cells.forEach(function(c){line.push(c.innerText.replace(/\n/g," ").trim());});
    tsv.push(line.join("\t"));
  });
  navigator.clipboard.writeText(tsv.join("\n")).then(function(){
    alert("복사완료 — 엑셀에 붙여넣기 하세요");
  });
}

// 초기화
document.getElementById("filterSel").style.display="";
reload();
</script>
</body>
</html>
